name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Publish build to docs/ and repo root
        run: |
          rm -rf docs assets
          cp -r dist docs
          touch docs/.nojekyll
          cp dist/index.html index.html
          cp dist/404.html 404.html
          cp -r dist/assets assets

      - name: Commit and push site files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs index.html 404.html assets
          git diff --staged --quiet && echo "No changes to deploy" && exit 0
          git commit -m "Deploy to GitHub Pages [skip ci]"
          git push
